name: CD — Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER:     testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB:       testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 linting
        run: flake8 app/ --max-line-length=100

      - name: Run pytest
        run: pyhton -m pytest app/tests/ -v
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb

  deploy:
    runs-on: ubuntu-latest
    needs: [ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/devops-project || mkdir -p ~/devops-project
            cd ~/devops-project
            git init || true
            git remote remove origin || true
            git remote add origin https://github.com/YOUR_USERNAME/2212240-devops-project.git
            git fetch origin main
            git checkout -f origin/main
            test -f .env.production || echo -e "DB_USER=devops_user\nDB_PASSWORD=YOUR_STRONG_PASS\nDB_NAME=devops_db" > .env.production
            cp .env.production .env
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build
            echo "Deployed at $(date)"